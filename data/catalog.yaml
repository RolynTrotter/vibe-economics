# Dataset registry — the source of truth for every dataset in the repo.
#
# Each entry is keyed by a stable snake_case `id`. The CLI (`app.cli acquire/compile`)
# and the service data loaders read this file. When you add a dataset via the
# acquire-dataset / compile-dataset skills, append an entry here.
#
# Fields:
#   title       human-readable name
#   source      organisation that publishes it
#   homepage    landing page for humans
#   url         direct download URL of the raw file (or API base)
#   license     license / terms summary (note any redistribution limits)
#   api_key     env var name if a key is required, else null
#   raw         path under data/raw/ where acquire writes the source file
#   processed   path under data/processed/ where compile writes tidy output
#   compiler    dotted path to the compile function (module:function)
#   notes       gotchas, units, coverage

datasets:
  jst_returns:
    title: "Jordà-Schularick-Taylor Macrohistory — annual asset returns (18 developed economies, 1870–2020)"
    source: "Jordà, Knoll, Kuvshinov, Schularick & Taylor, 'The Rate of Return on Everything, 1870-2015' (Macrohistory DB R6)"
    homepage: "https://www.macrohistory.net/database/"
    url: "https://raw.githubusercontent.com/unbalancedparentheses/forex-centuries/main/data/sources/jst/jst_macrohistory.xlsx"
    license: >
      Free for academic/non-commercial use; cite Jordà et al. (2019). Mirrored
      from the forex-centuries replication repo (macrohistory.net is unreachable
      under restrictive network policies).
    api_key: null
    raw: "jst_returns/jst_macrohistory.xlsx"
    processed: "jst_returns.parquet"
    compiler: "app.services.safe_withdrawal.data:compile_jst"
    notes: >
      Annual nominal total returns. Columns used: eq_tr (equity total return),
      bond_tr (government bond total return), cpi, xrusd (local currency per USD),
      rgdpmad (Maddison real GDP per capita), pop. The compiler emits a US-investor
      view: us_stock = USA eq_tr; bond = USA bond_tr; inflation = USA CPI change;
      intl_stock = GDP-weighted (rgdpmad*pop, prior-year) developed-ex-US equity
      total return converted to USD via xrusd. Powers the safe-withdrawal reference
      service (real international sleeve so the 3-fund genuinely differs from 60/40).

  shiller_returns:
    title: "Shiller U.S. Stock Market Data (S&P 500 prices, dividends, earnings, CPI, 10yr rate)"
    source: "Robert J. Shiller, Yale University (CSV mirror: github.com/datasets/s-and-p-500)"
    homepage: "http://www.econ.yale.edu/~shiller/data.htm"
    url: "https://raw.githubusercontent.com/datasets/s-and-p-500/main/data/data.csv"
    license: "Free for academic/personal use; cite Shiller. Not for resale."
    api_key: null
    raw: "shiller_returns/sp500.csv"
    processed: "shiller_returns.parquet"
    compiler: "app.services.safe_withdrawal.data:compile_shiller"
    notes: >
      Monthly since 1871 (Date, SP500 price, Dividend, Earnings, CPI, Long Interest
      Rate/GS10). We derive annual nominal total returns for stocks (price +
      reinvested dividends) and a 10yr-Treasury par-bond proxy, plus annual CPI
      inflation. Sourced from the GitHub CSV mirror because Yale/Shiller is not
      reachable under restrictive network policies; the data is identical. Retained
      as a US-only alternative / cross-check; the service now uses jst_returns.

  subnational_gdp:
    title: "Subnational GDP comparison — US states vs countries (nominal, PPP, per-capita)"
    source: "BEA Regional (US state GDP & population) + World Bank WDI (country GDP/PPP/population)"
    homepage: "https://apps.bea.gov/regional/ ; https://data.worldbank.org/"
    url: "multi-source (BEA API + World Bank API) — see acquire() in service data.py"
    license: >
      BEA: U.S. Government work, public domain. World Bank WDI: CC BY 4.0.
      Both license-clean; attribute World Bank.
    api_key: "BEA_API_KEY"
    raw: "subnational_gdp/"
    processed: "subnational_gdp.parquet"
    compiler: "app.services.subnational_gdp.data:compile_subnational_gdp"
    notes: >
      Multi-call acquisition, so use the service entrypoint rather than the
      single-URL CLI:  python -m app.services.subnational_gdp.data build
      (acquire + compile + write parquet). Tidy schema: entity_id, name, kind
      (state|country), parent (nation id; USA for states), gdp_nominal_usd,
      gdp_ppp_usd, population, year. US-state ppp = nominal (US ≈ PPP base; ~1.01).
      Powers the subnational_gdp service (ticket 0002) and the shared app/core/geo.py.

  subnational_gdp_timeseries:
    title: "Subnational GDP — multi-year time series (US states + countries: nominal, PPP, population)"
    source: "BEA Regional (US state GDP & income, 1997+) + World Bank WDI (country GDP/PPP/population history) + IMF DataMapper/WEO (near-term growth for casting forward)"
    homepage: "https://apps.bea.gov/regional/ ; https://data.worldbank.org/ ; https://www.imf.org/external/datamapper/"
    url: "multi-source (BEA + World Bank + IMF APIs) — see acquire() in service timeseries.py"
    license: >
      BEA: U.S. Government work, public domain. World Bank WDI: CC BY 4.0. IMF
      DataMapper: IMF terms, attribution required. All license-clean.
    api_key: "BEA_API_KEY"
    raw: "subnational_gdp_timeseries/"
    processed: "subnational_gdp_timeseries.parquet"
    compiler: "app.services.subnational_gdp.timeseries:compile_timeseries"
    notes: >
      Multi-call acquisition; build via the service entrypoint:
      python -m app.services.subnational_gdp.timeseries build
      (acquire + compile + write parquet). Long tidy schema: entity_id, name, kind
      (state|country), parent, region, year, metric (gdp_nominal_usd | gdp_ppp_usd |
      population), value (absolute units), source (bea | worldbank = observed actuals;
      imf = WEO observations/forecasts used only for near-term growth). Powers the
      year-slider + same-year smoothing/imputation in the subnational_gdp service
      (ticket 0009); estimate.py aligns every place to a chosen year and flags
      interpolated/extrapolated figures.

  sp500_constituent_returns:
    title: "S&P 500 constituent annual total returns (current members) + S&P 500 Total Return index"
    source: "GitHub datasets/s-and-p-500-companies (constituent list) + Yahoo Finance chart API (monthly adjusted close & ^SP500TR)"
    homepage: "https://finance.yahoo.com/ ; https://github.com/datasets/s-and-p-500-companies"
    url: "multi-source (GitHub raw CSV + Yahoo chart API) — see acquire() in service data.py"
    license: >
      Constituent list: public-domain CSV mirror. Yahoo Finance: personal/non-
      commercial use only (no redistribution of raw quotes). We commit only the
      derived annual total-return panel, not raw Yahoo quotes.
    api_key: null
    raw: "sp500_constituent_returns/"
    processed: "sp500_constituent_returns.parquet"
    compiler: "app.services.espp_median_stock.data:compile_dataset"
    notes: >
      Multi-call acquisition; build via the service entrypoint rather than the
      single-URL CLI:  python -m app.services.espp_median_stock.data build
      (acquire + compile + write parquet). Tidy long schema: ticker, year,
      total_return (Dec(t-1)->Dec(t), reinvested dividends, decimal), kind
      (stock | index). Stocks use Yahoo monthly adjusted close (split + dividend
      adjusted = total return); the benchmark row uses SPY (SPDR S&P 500 ETF)
      adjusted close, a total-return S&P 500 on the same Yahoo footing (Yahoo's
      ^SP500TR is served too sparsely to use). Powers the ESPP / median-stock
      service. CAVEAT: universe is
      *today's* S&P 500 members, so it is survivorship-biased upward — the true
      median stock did worse, making the "median lags the index" finding a
      conservative lower bound.

  sp500_monthly_levels:
    title: "S&P 500 constituent monthly total-return levels (current members) + SPY"
    source: "Same raw as sp500_constituent_returns (Yahoo monthly adjusted close + SPY)."
    homepage: "https://finance.yahoo.com/ ; https://github.com/datasets/s-and-p-500-companies"
    url: "multi-source — built alongside sp500_constituent_returns (see service data.py)"
    license: >
      Derived monthly total-return levels only (not raw Yahoo quotes); personal/
      non-commercial use. Committed so the ESPP Analyzer runs offline.
    api_key: null
    raw: "sp500_constituent_returns/"
    processed: "sp500_monthly_levels.parquet"
    compiler: "app.services.espp_median_stock.data:compile_monthly"
    notes: >
      Built by the same entrypoint as sp500_constituent_returns:
      python -m app.services.espp_median_stock.data build. Tidy schema: ticker,
      mkey (dense calendar month = year*12 + month-1), year, month, level
      (split+dividend-adjusted close = total-return level), kind (stock | index;
      index = SPY). Powers the ESPP Analyzer's arbitrary-horizon (contribution
      term + holding period) returns and the lookback min(start, purchase). Same
      survivorship caveat as sp500_constituent_returns (current members only).

  # --- Catalogued sources for upcoming services (acquire/compile not yet wired) ---

  subnational_metros:
    title: "OECD Functional Urban Area metros (GDP share of national, PPP GDP, per-capita) — metro punch-out"
    source: "OECD Regional/Metropolitan database — FUA Economy (DSD_FUA_ECO@DF_ECONOMY) + World Bank WDI national totals"
    homepage: "https://www.oecd.org/en/data/datasets/oecd-regional-statistics.html"
    url: "https://sdmx.oecd.org/public/rest/data/OECD.CFE.EDS,DSD_FUA_ECO@DF_ECONOMY,1.1/all"
    license: >
      OECD terms (free reuse with attribution). World Bank WDI: CC BY 4.0.
    api_key: null
    raw: "subnational_metros/"
    processed: "subnational_metros.parquet"
    compiler: "app.services.subnational_gdp.metros:compile_metros"
    notes: >
      Multi-call acquisition; build via the service entrypoint:
      python -m app.services.subnational_gdp.metros build.
      One consistent FUA methodology across the US, Europe, Japan, Korea, etc.
      Each metro carries GDP as % of national value (the carve-out for "punching
      out" a metro from its country), PPP GDP, and derived population. Powers the
      hinterland comparison (ticket 0008). Coverage is OECD/EU only.

  median_income:
    title: "Median income (PPP) — US states (Census ACS household) + countries (OECD IDD equivalised disposable)"
    source: "Census ACS B19013/B19001 + OECD IDD (DSD_WISE_IDD@DF_IDD) + World Bank consumption PPP (PA.NUS.PRVT.PP) + Eurostat ilc_di17/ilc_di03 (rural median, PPS)"
    homepage: "https://www.oecd.org/social/income-distribution-database.htm"
    url: "https://sdmx.oecd.org/public/rest/data/OECD.WISE.INE,DSD_WISE_IDD@DF_IDD,/.A.INC_DISP.MEDIAN.XDC_HH_EQ._T.METH2012.D_CUR._Z"
    license: "OECD terms (free reuse w/ attribution); Census & World Bank public/CC BY 4.0."
    api_key: "CENSUS_API_KEY"
    raw: "median_income/"
    processed: "median_income.parquet"
    compiler: "app.services.subnational_gdp.median_income:compile_median_income"
    notes: >
      Multi-call acquisition; build via:
      python -m app.services.subnational_gdp.median_income build.
      Countries: OECD IDD median equivalised disposable income (national currency)
      ÷ World Bank private-consumption PPP. US states: Census ACS median household
      income scaled by the US anchor ratio onto the OECD equivalised scale. Adds the
      "median income (PPP)" basis (ticket 0007); OECD/EU coverage. Also a "rural
      median (PPP)" / exclude-cities column: Europe scales the national figure by the
      Eurostat rural/national ratio (ilc_di17 DEG3 ÷ ilc_di03, both PPS); US states use
      the nonmetro-county median (Census B19001 brackets) × the US anchor.

  us_state_metros:
    title: "US metros by state (CSA-first footprint; in-state county GDP & population) — per-state metro punch-out"
    source: "Census/OMB 2023 CBSA/CSA delineation + BEA county GDP (CAGDP2) & population (CAINC1)"
    homepage: "https://www.census.gov/programs-surveys/metro-micro.html"
    url: "https://www2.census.gov/programs-surveys/metro-micro/geographies/reference-files/2023/delineation-files/list1_2023.xlsx"
    license: "U.S. Government work, public domain (Census + BEA)."
    api_key: "BEA_API_KEY"
    raw: "us_state_metros/"
    processed: "us_state_metros.parquet"
    compiler: "app.services.subnational_gdp.us_metros:compile_us_metros"
    notes: >
      Multi-call acquisition; build via:
      python -m app.services.subnational_gdp.us_metros build.
      Metro footprint = Combined Statistical Area (broad commuting zone; captures the
      Hudson Valley etc.), CBSA fallback. Split across states by county GDP (place of
      work) and county population (residence). Powers phase 2 of ticket 0008; see
      docs/tickets/0008-metro-allocation-analysis.md.

  nonoecd_metros:
    title: "Non-OECD metros (curated) — capital/largest/richest metro GDP & population for big non-OECD economies"
    source: "Curated from national statistical offices / city yearbooks / public reporting (~2022-2024); shares computed vs World Bank national GDP"
    homepage: "https://en.wikipedia.org/wiki/List_of_cities_by_GDP"
    url: null
    license: "Curated estimates; underlying figures are public-domain national statistics."
    api_key: null
    raw: null
    processed: "nonoecd_metros.parquet"
    compiler: "app.services.subnational_gdp.nonoecd_metros:compile_nonoecd_metros"
    notes: >
      No global metro-GDP API exists, so this is a deliberately curated, flagged-as-
      estimate table (China, India, Brazil, Russia, Indonesia, Saudi, Argentina, South
      Africa, Egypt, Nigeria, Thailand, Philippines, Vietnam, Pakistan, Bangladesh).
      Adds non-OECD countries to the hinterland punch-out view (ticket 0008 phase 3).
      Build: python -m app.services.subnational_gdp.nonoecd_metros build.

  damodaran_histret:
    title: "Historical Returns on Stocks, Bonds and Bills - United States"
    source: "Aswath Damodaran, NYU Stern"
    homepage: "https://pages.stern.nyu.edu/~adamodar/New_Home_Page/datacurrent.html"
    url: "https://pages.stern.nyu.edu/~adamodar/pc/datasets/histretSP.xls"
    license: "Free for educational use."
    api_key: null
    raw: "damodaran_histret/histretSP.xls"
    processed: null
    compiler: null
    notes: "Alternative annual returns series (stocks/T.bonds/T.bills/inflation) back to 1928. Backup for shiller_returns."

  worldbank_indicators:
    title: "World Bank World Development Indicators (GDP, PPP, population, etc.)"
    source: "The World Bank"
    homepage: "https://data.worldbank.org/"
    url: "https://api.worldbank.org/v2/country/{country}/indicator/{indicator}?format=json&per_page=20000"
    license: "CC BY 4.0"
    api_key: null
    raw: "worldbank/{indicator}.json"
    processed: null
    compiler: null
    notes: "Key-free REST API. Indicators e.g. NY.GDP.MKTP.PP.CD (GDP PPP), SP.POP.TOTL. Used by subnational-GDP & cost-of-living services."

  imf_datamapper:
    title: "IMF DataMapper (WEO indicators)"
    source: "International Monetary Fund"
    homepage: "https://www.imf.org/external/datamapper/"
    url: "https://www.imf.org/external/datamapper/api/v1/{indicator}"
    license: "IMF terms; attribution required."
    api_key: null
    raw: "imf/{indicator}.json"
    processed: null
    compiler: null
    notes: "Key-free. NGDPD (GDP USD), PPPGDP (GDP PPP), etc."

  bea_regional:
    title: "BEA Regional Economic Accounts (US state/county GDP & income)"
    source: "U.S. Bureau of Economic Analysis"
    homepage: "https://apps.bea.gov/regional/"
    url: "https://apps.bea.gov/api/data/?UserID={api_key}&method=GetData&datasetname=Regional"
    license: "U.S. Government work, public domain."
    api_key: "BEA_API_KEY"
    raw: "bea/{table}.json"
    processed: null
    compiler: null
    notes: "Requires free API key. State/county GDP, personal income. Used by subnational-GDP service."

  eurostat:
    title: "Eurostat statistics (regional GDP, GDP per capita PPS, etc.)"
    source: "Eurostat"
    homepage: "https://ec.europa.eu/eurostat/web/main/data/database"
    url: "https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/{dataset}?format=JSON"
    license: "Eurostat reuse policy (free reuse with attribution)."
    api_key: null
    raw: "eurostat/{dataset}.json"
    processed: null
    compiler: null
    notes: "Key-free JSON-stat API. nama_10r_2gdp = regional GDP. Used by subnational-GDP service."

  fed_scf:
    title: "Federal Reserve Survey of Consumer Finances (wealth & income distribution)"
    source: "U.S. Federal Reserve Board"
    homepage: "https://www.federalreserve.gov/econres/scfindex.htm"
    url: "https://www.federalreserve.gov/econres/files/scf2022_tables_public_real_historical.xlsx"
    license: "U.S. Government work, public domain."
    api_key: null
    raw: "fed_scf/scf_historical.xlsx"
    processed: null
    compiler: null
    notes: "Also see DFA (Distributional Financial Accounts) for quarterly wealth by percentile. Used by Fed wealth/income service."

  fed_dfa:
    title: "Federal Reserve Distributional Financial Accounts (wealth by percentile, quarterly)"
    source: "U.S. Federal Reserve Board"
    homepage: "https://www.federalreserve.gov/releases/z1/dataviz/dfa/"
    url: "https://www.federalreserve.gov/releases/z1/dataviz/dfa/distribute/table/dfa-income-levels.csv"
    license: "U.S. Government work, public domain."
    api_key: null
    raw: "fed_dfa/dfa.csv"
    processed: null
    compiler: null
    notes: "CSV download, no key. Wealth/income shares by percentile over time."

  fred:
    title: "FRED (Federal Reserve Economic Data)"
    source: "Federal Reserve Bank of St. Louis"
    homepage: "https://fred.stlouisfed.org/"
    url: "https://api.stlouisfed.org/fred/series/observations?series_id={series}&api_key={api_key}&file_type=json"
    license: "Varies by series; FRED terms of use."
    api_key: "FRED_API_KEY"
    raw: "fred/{series}.json"
    processed: null
    compiler: null
    notes: "Requires free API key. Huge breadth of macro series. General-purpose backup source."

  numbeo_cost_of_living:
    title: "Numbeo Cost of Living (city-level prices: rent, groceries, etc.)"
    source: "Numbeo"
    homepage: "https://www.numbeo.com/cost-of-living/"
    url: "https://www.numbeo.com/api/"
    license: "PROPRIETARY — API requires paid key; scraping restricted by ToS. Handle carefully."
    api_key: "NUMBEO_API_KEY"
    raw: "numbeo/{city}.json"
    processed: null
    compiler: null
    notes: >
      Flagship cost-of-living service's richest city-level source but license-gray.
      Prefer official stats (BLS, OECD, Eurostat, national stat offices) where possible;
      use Numbeo only with a valid key and within its terms. See ticket 0005.

  oecd:
    title: "OECD statistics (price levels, PPP, regional wellbeing)"
    source: "OECD"
    homepage: "https://data.oecd.org/"
    url: "https://sdmx.oecd.org/public/rest/data/{dataflow}/{key}?format=jsondata"
    license: "OECD terms; free reuse with attribution."
    api_key: null
    raw: "oecd/{dataflow}.json"
    processed: null
    compiler: null
    notes: "Key-free SDMX API. Comparative price levels, PPPs. License-clean alternative for cost-of-living."

  cpi_major_groups:
    title: "US CPI major groups — monthly index (localized-inflation lens, ticket 0010)"
    source: "U.S. Bureau of Labor Statistics, CPI-U (U.S. city average, not seasonally adjusted)"
    homepage: "https://www.bls.gov/cpi/"
    url: "https://api.bls.gov/publicAPI/v2/timeseries/data/ (POST; multi-series, see service data.py)"
    license: "U.S. Government work, public domain. Attribute BLS."
    api_key: "BLS_API_KEY"
    raw: "cpi_major_groups/"
    processed: "cpi_major_groups.parquet"
    compiler: "app.services.negative_productivity.data:compile_cpi"
    notes: >
      Multi-call API, so use the service entrypoint rather than the single-URL CLI:
      python -m app.services.negative_productivity.data build  (acquire + compile + write).
      Tidy long schema: year, month, category, cpi_index. Series are CUUR0000 (CPI-U,
      US city avg, NSA): SA0 All items (headline) + six major groups with continuous
      history since 1967 — SAF Food and beverages, SAH Housing, SAA Apparel, SAT
      Transportation, SAM Medical care, SAG Other goods and services. Recreation (SAR)
      and Education & communication (SAE) start in the 1998 revision and are omitted to
      keep the dispersion panel consistent. Powers the localized-inflation lens
      (relative-price dispersion; Ball & Mankiw 1995).

  sec_zombie_fundamentals:
    title: "SEC EDGAR XBRL fundamentals — operating income & interest expense (zombie-firm lens, ticket 0010)"
    source: "U.S. SEC EDGAR, XBRL 'frames' API (data.sec.gov)"
    homepage: "https://www.sec.gov/edgar/sec-api-documentation"
    url: "https://data.sec.gov/api/xbrl/frames/us-gaap/{concept}/USD/CY{year}.json (multi-call, see service zombie_data.py)"
    license: "U.S. Government work, public domain. SEC fair-use: send a descriptive User-Agent with contact."
    api_key: null
    raw: "sec_zombie_fundamentals/"
    processed: "sec_zombie_fundamentals.parquet"
    compiler: "app.services.negative_productivity.zombie_data:compile_zombie"
    notes: >
      Multi-call API, so use the service entrypoint rather than the single-URL CLI:
      python -m app.services.negative_productivity.zombie_data build  (acquire + compile).
      Pulls two us-gaap concepts per year (CY frames, 2009–present): OperatingIncomeLoss
      (EBIT proxy) and InterestExpense. Tidy panel: cik, name, loc, year, ebit, interest,
      icr (= ebit/interest, kept only where interest>0). Powers the zombie-firm lens:
      interest-coverage < 1 for ≥3 consecutive years (BIS definition). Caveats: US-listed
      XBRL universe only (~2009+); financials/utilities not excluded; firm "age" is a
      reporting-age proxy; delisted zombies leave the panel (survivorship).
